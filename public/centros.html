<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Centros - Puente Solidario</title>
  <link rel="stylesheet" href="/css/variables.css"><link rel="stylesheet" href="/css/global.css"><link rel="stylesheet" href="/css/components.css"><link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
  <header class="site-header"><nav class="container nav"><a class="brand" href="/">Puente Solidario<span>Chile-Venezuela</span></a><div class="nav-links"><a href="/">Inicio</a><a href="/centros.html">Centros</a><a href="/necesidades.html">Necesidades</a><a href="/registrar-centro.html">Registrar centro</a><a href="/admin/login.html">Admin</a></div></nav></header>
  <main class="container page">
    <div class="page-title"><h1>Centros de acopio</h1><p class="muted">Busca centros verificados y revisa que productos reciben.</p></div>
    <form id="filters" class="filters">
      <input class="form-control" name="q" placeholder="Nombre, region o comuna">
      <input class="form-control" name="region" placeholder="Region">
      <input class="form-control" name="comuna" placeholder="Comuna">
      <select class="form-control" name="estado"><option value="">Estado</option><option value="verificado">Verificado</option><option value="requiere_actualizacion">Requiere actualizacion</option></select>
      <input class="form-control" name="producto" placeholder="Producto">
      <button class="btn btn-primary">Filtrar</button>
    </form>
    <div id="centersList" class="grid grid-2"></div>
  </main>
  <script src="/js/api.js"></script><script src="/js/centros.js"></script><script src="/js/centros-redesign.js"></script>
</body>
</html>
